type: object
required:
  - id
  - roleId
  - authApiContractId
  - createdAtUtc0
  - updatedAtUtc0
  - createdBy
  - isActive
properties:
  id:
    type: string
    description: Role API contract mapping id
    example: "31267553-e12a-497d-bc4a-767b642f4dd6"
  roleId:
    type: string
    description: Auth role id
    example: "1f2f4181-b4b1-4812-9f57-a6a315654040"
  authApiContractId:
    type: string
    description: API contract id assigned to the role
    example: "CryptoEncryptText"
  createdAtUtc0:
    type: integer
    format: int64
    description: Created at in UTC+0 Unix millisecond time
    example: 1798790400000
  updatedAtUtc0:
    type: integer
    format: int64
    description: Updated at in UTC+0 Unix millisecond time
    example: 1798790400000
  createdBy:
    type: string
    description: Creator identifier
    example: "admin-user"
  isActive:
    type: boolean
    description: Whether the role API contract mapping is active
    example: true
