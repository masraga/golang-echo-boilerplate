get:
  tags:
    - Auth Access
  operationId: ListAuthApiContracts
  summary: List API contracts
  description: Requires Authorization header and a user API contract grant.
  responses:
    '200':
      description: API contracts listed successfully
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ListAuthApiContractsResponse.yaml'
    '401':
      description: Unauthorized, missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ErrorUnauthorized.yaml'
    '403':
      description: Forbidden, user has no API contract grant
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ErrorForbidden.yaml'
post:
  tags:
    - Auth Access
  operationId: CreateAuthApiContract
  summary: Create API contract
  description: Requires Authorization header and a user API contract grant.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../../../component/schema/CreateAuthApiContractRequest.yaml'
  responses:
    '201':
      description: API contract created successfully
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/AuthApiContract.yaml'
    '400':
      description: Bad request error
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ErrorBadRequest.yaml'
    '401':
      description: Unauthorized, missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ErrorUnauthorized.yaml'
    '403':
      description: Forbidden, user has no API contract grant
      content:
        application/json:
          schema:
            $ref: '../../../../../component/schema/ErrorForbidden.yaml'
