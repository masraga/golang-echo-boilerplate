post:
  tags:
    - Authentication
  operationId: RegisterPhoneNumber
  summary: Register a user phone number or request a fresh OTP
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../../../../component/schema/RegisterPhoneNumberRequest.yaml'
  responses:
    '201':
      description: OTP created successfully for a new or existing account
      content:
        application/json:
          schema:
            $ref: '../../../../../../component/schema/RegisterPhoneNumberResponse.yaml'
    '400':
      description: Bad request due to invalid input data
      content:
        application/json:
          schema:
            $ref: '../../../../../../component/schema/ErrorBadRequest.yaml'
