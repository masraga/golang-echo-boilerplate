openapi: 3.0.0
info:
  title: Koderpedia ERP API
  version: 1.0.0
servers:
  - url: 'http://localhost:1323'
    description: Local development server
tags:
  - name: Health Check
    description: Endpoints for checking the health of the API
  - name: Authentication
    description: Endpoints for user authentication and registration
  - name: Crypto
    description: Endpoints for cryptographic operations such as encryption and decryption
  - name: Auth Access
    description: Endpoints for managing API access contracts
  - name: Auth Roles
    description: Endpoints for managing auth roles and role API access
paths:
  /api/v1/ping:
    get:
      tags:
        - Health Check
      operationId: GetPing
      summary: Check the health of the API
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPingResponse'
  /api/v1/auth/register/phone:
    post:
      tags:
        - Authentication
      operationId: RegisterPhoneNumber
      summary: Register a user phone number or request a fresh OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNewAccountRequest'
      responses:
        '201':
          description: OTP created successfully for a new or existing account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNewAccountResponse'
        '400':
          description: Bad request due to invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
  /api/v1/auth/validate/pin:
    post:
      tags:
        - Authentication
      operationId: AuthValidatePin
      summary: Validate a PIN code for authentication.
      description: 'Validate user pin code, if pin already provided login if not, create new pin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthValidatePinRequest'
      responses:
        '200':
          description: Successful authentication with valid PIN.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthValidatePinResponse'
        '400':
          description: 'Bad request, invalid input data.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, invalid PIN or authentication failed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorInternalServerError'
  /api/v1/crypto/encrypt:
    post:
      tags:
        - Crypto
      operationId: CryptoEncryptText
      summary: encrypt plain text to aes encryption
      description: 'Requires Authorization header with the JWT access token returned by AuthValidatePin, formatted as Bearer <token>.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoEncryptTextRequest'
      responses:
        '200':
          description: Result ecnrypted text that already encode to base64
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CryptoEncryptTextResponse'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
  /api/v1/auth/otp/verify:
    post:
      tags:
        - Authentication
      summary: Verify OTP code for user authentication
      operationId: VerifyNewAuthUserOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
      responses:
        '200':
          description: OTP verification successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOTPResponse200'
        '400':
          description: 'Bad request, invalid input data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, invalid OTP code'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user does not have permission to access this resource'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  /api/v1/auth/api-contracts:
    get:
      tags:
        - Auth Access
      operationId: ListAuthApiContracts
      summary: List API contracts
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: API contracts listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuthApiContractsResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    post:
      tags:
        - Auth Access
      operationId: CreateAuthApiContract
      summary: Create API contract
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthApiContractRequest'
      responses:
        '201':
          description: API contract created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthApiContract'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/api-contracts/{id}':
    parameters:
      - name: id
        in: path
        required: true
        description: API contract id
        schema:
          type: string
          example: CryptoEncryptText
    get:
      tags:
        - Auth Access
      operationId: GetAuthApiContract
      summary: Get API contract
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: API contract returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthApiContract'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    put:
      tags:
        - Auth Access
      operationId: UpdateAuthApiContract
      summary: Update API contract
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthApiContractRequest'
      responses:
        '200':
          description: API contract updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthApiContract'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    delete:
      tags:
        - Auth Access
      operationId: DeleteAuthApiContract
      summary: Delete API contract
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: API contract deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAuthAccessResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  /api/v1/auth/user-api-contracts:
    get:
      tags:
        - Auth Access
      operationId: ListAuthUserApiContracts
      summary: List user API contract grants
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: User API contract grants listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuthUserApiContractsResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    post:
      tags:
        - Auth Access
      operationId: CreateAuthUserApiContract
      summary: Create user API contract grant
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthUserApiContractRequest'
      responses:
        '201':
          description: User API contract grant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserApiContract'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/user-api-contracts/{id}':
    parameters:
      - name: id
        in: path
        required: true
        description: User API contract grant id
        schema:
          type: string
          example: 1d7e2f23-b4c3-4ad7-8478-e770b68e6f11
    get:
      tags:
        - Auth Access
      operationId: GetAuthUserApiContract
      summary: Get user API contract grant
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: User API contract grant returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserApiContract'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    put:
      tags:
        - Auth Access
      operationId: UpdateAuthUserApiContract
      summary: Update user API contract grant
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthUserApiContractRequest'
      responses:
        '200':
          description: User API contract grant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserApiContract'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    delete:
      tags:
        - Auth Access
      operationId: DeleteAuthUserApiContract
      summary: Delete user API contract grant
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: User API contract grant deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAuthAccessResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  /api/v1/auth/roles:
    get:
      tags:
        - Auth Roles
      operationId: ListAuthRoles
      summary: List auth roles
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: Auth roles listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuthRolesResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    post:
      tags:
        - Auth Roles
      operationId: CreateAuthRole
      summary: Create auth role
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthRoleRequest'
      responses:
        '201':
          description: Auth role created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRole'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/roles/{id}':
    parameters:
      - name: id
        in: path
        required: true
        description: Auth role id
        schema:
          type: string
          example: 1f2f4181-b4b1-4812-9f57-a6a315654040
    get:
      tags:
        - Auth Roles
      operationId: GetAuthRole
      summary: Get auth role
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: Auth role returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRole'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    put:
      tags:
        - Auth Roles
      operationId: UpdateAuthRole
      summary: Update auth role
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthRoleRequest'
      responses:
        '200':
          description: Auth role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRole'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    delete:
      tags:
        - Auth Roles
      operationId: DeleteAuthRole
      summary: Delete auth role
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: Auth role deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAuthAccessResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/roles/{roleId}/api-contracts':
    parameters:
      - name: roleId
        in: path
        required: true
        description: Auth role id
        schema:
          type: string
          example: 1f2f4181-b4b1-4812-9f57-a6a315654040
    get:
      tags:
        - Auth Roles
      operationId: ListAuthRoleContractApis
      summary: List role API contracts
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: Role API contracts listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAuthRoleContractApisResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    post:
      tags:
        - Auth Roles
      operationId: CreateAuthRoleContractApi
      summary: Assign API contract to role
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthRoleContractApiRequest'
      responses:
        '201':
          description: Role API contract created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRoleContractApi'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/roles/{roleId}/api-contracts/{id}':
    parameters:
      - name: roleId
        in: path
        required: true
        description: Auth role id
        schema:
          type: string
          example: 1f2f4181-b4b1-4812-9f57-a6a315654040
      - name: id
        in: path
        required: true
        description: Role API contract mapping id
        schema:
          type: string
          example: 31267553-e12a-497d-bc4a-767b642f4dd6
    delete:
      tags:
        - Auth Roles
      operationId: DeleteAuthRoleContractApi
      summary: Remove API contract from role
      description: Requires Authorization header and a user API contract grant.
      responses:
        '200':
          description: Role API contract deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAuthAccessResponse'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
  '/api/v1/auth/users/{userId}/role':
    parameters:
      - name: userId
        in: path
        required: true
        description: Auth user id
        schema:
          type: string
          example: 358cbaad-316e-4539-9949-2636cdbd7e89
    put:
      tags:
        - Auth Roles
      operationId: AssignAuthUserRole
      summary: Assign role to auth user
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignAuthUserRoleRequest'
      responses:
        '200':
          description: User role assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignAuthUserRoleResponse'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
    delete:
      tags:
        - Auth Roles
      operationId: DeleteAuthUserRole
      summary: Remove role from auth user
      description: Requires Authorization header and a user API contract grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - createdBy
              properties:
                createdBy:
                  type: string
                  description: Creator identifier
                  example: admin-user
      responses:
        '200':
          description: User role removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAuthAccessResponse'
        '400':
          description: Bad request error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBadRequest'
        '401':
          description: 'Unauthorized, missing or invalid bearer token'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorUnauthorized'
        '403':
          description: 'Forbidden, user has no API contract grant'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorForbidden'
components:
  schemas:
    GetPingResponse:
      type: object
      properties:
        message:
          type: string
          description: The response message for the ping endpoint
          example: PONG
    CreateNewAccountRequest:
      type: object
      required:
        - phoneNo
        - firebaseId
      properties:
        phoneNo:
          type: string
          description: User phone number
          example: 6281234567890
        firebaseId:
          type: string
          minLength: 1
          description: Firebase Cloud Messaging registration token for the user's current device
          example: fcm-registration-token
    CreateNewAccountResponse:
      type: object
      required:
        - id
        - otpCode
      properties:
        id:
          type: string
          description: The unique identifier for the registered auth account
          example: 123e4567-e89b-12d3-a456-426
        otpCode:
          type: string
          description: OTP code issued to the user
          example: 45142
    VerifyOTPRequest:
      type: object
      required:
        - otp
        - phoneNo
      properties:
        otp:
          type: string
          description: The OTP code sent to the user's phone number for verification
          example: '123456'
        phoneNo:
          type: string
          description: The user's phone number associated with the OTP code
          example: 081234567890
    VerifyOTPResponse200:
      type: object
      required:
        - isValid
        - phoneNo
        - isNewUser
      properties:
        isValid:
          type: boolean
          description: Indicates whether the provided OTP code is valid or not
          example: true
        phoneNo:
          type: string
          description: The user's phone number associated with the OTP code
          example: 081234567890
        note:
          type: string
          description: Additional information or notes regarding the OTP verification result
          example: OTP code is valid and has not expired
        isNewUser:
          type: boolean
          description: Indicates whether the user is new or existing based on the phone number
          example: true
    ErrorBadRequest:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: The error message describing the bad request
          example: Invalid input data
    ErrorUnauthorized:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: The error message describing the unauthorized access
          example: 'Unauthorized, invalid OTP code'
    ErrorForbidden:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: The error message describing the forbidden access
